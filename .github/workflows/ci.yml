on:
  pull_request:
  push:
    branches:
      - main

name: Lint and Test
permissions:
  contents: read

jobs:
  test:
    name: Lint/Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          cache-on-failure: true

      - run: vp install
      - run: npm run bootstrap
      - run: npm run lint
      - name: Run JS Tests
        run: vp test
      - name: Run Rust Tests
        run: cargo test --all
